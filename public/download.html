<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Prompt & Implementasi Suara Gemoy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #000;
        }
        .brutalist-card {
            box-shadow: 10px 10px 0px #facc15;
            transition: all 0.2s ease;
        }
        .brutalist-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 14px 14px 0px #facc15;
        }
        .brutalist-button {
            box-shadow: 4px 4px 0px #000;
        }
        .brutalist-button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-zinc-950">
    <div class="max-w-2xl w-full">
        <div class="bg-zinc-900 border-4 border-white p-10 brutalist-card rounded-none">
            <a href="/" class="inline-flex items-center gap-2 text-zinc-500 hover:text-yellow-400 font-black uppercase tracking-widest text-[10px] mb-8 transition-colors group">
                <span class="group-hover:-translate-x-1 transition-transform">←</span> KEMBALI KE APLIKASI
            </a>
            <h1 class="text-6xl font-black text-white uppercase tracking-tighter leading-none mb-4">
                SUARA <span class="text-yellow-400">GEMOY</span>
            </h1>
            <p class="text-zinc-400 font-bold uppercase tracking-[0.2em] text-xs mb-10 border-l-4 border-yellow-400 pl-4">
                Asset Hub & Prompt Downloader
            </p>

            <div class="space-y-6">
                <!-- Prompt Downloader -->
                <div class="p-6 bg-black border-2 border-zinc-800 flex items-center justify-between group hover:border-yellow-400 transition-colors">
                    <div>
                        <h2 class="text-white font-black uppercase tracking-widest text-sm mb-1">AI Prompt File</h2>
                        <p class="text-zinc-500 text-[10px] uppercase font-bold">Markdown format • Instructions for AI</p>
                    </div>
                    <a href="/prompt.md" download="suara-gemoy-prompt.md" class="bg-yellow-400 text-black px-6 py-3 font-black uppercase tracking-widest text-[10px] brutalist-button hover:bg-white transition-colors">
                        Download MD
                    </a>
                </div>

                <!-- Implementation Downloader -->
                <div class="p-6 bg-black border-2 border-zinc-800 flex items-center justify-between group hover:border-yellow-400 transition-colors">
                    <div>
                        <h2 class="text-white font-black uppercase tracking-widest text-sm mb-1">Source Code</h2>
                        <p class="text-zinc-500 text-[10px] uppercase font-bold">GitHub Repository • Full Project Files</p>
                    </div>
                    <a href="https://github.com/arekgresikid/suara-gemoy" target="_blank" class="bg-white text-black px-6 py-3 font-black uppercase tracking-widest text-[10px] brutalist-button hover:bg-yellow-400 transition-colors">
                        View Repo
                    </a>
                </div>
            </div>

            <div class="mt-12 pt-8 border-t-2 border-zinc-800">
                <p class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest">
                    &copy; 2026 1 RuangRiung • Created by Antigravity
                </p>
            </div>
        </div>
    </div>
</body>
</html>
